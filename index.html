<style>

body{
margin:0;

text-align:center;
color:white;

/* Animated Gradient */
background:linear-gradient(270deg,#c000ff,#7a00ff,#ff00cc,#3333ff);
background-size:800% 800%;
animation:gradientMove 10s ease infinite;
}

/* Animation */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Profile */

.profile{
padding-top:40px;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid white;
}

h1{
margin:15px 10px;
font-size:26px;
}

/* Buttons */

.link-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:90%;
max-width:320px;
margin:12px auto;
padding:15px;
background:white;
color:#333;
text-decoration:none;
border-radius:12px;
font-weight:bold;
font-size:16px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
position:relative;
overflow:hidden;
}

.link-btn i{
font-size:20px;
}

/* Glow Hover */

.link-btn:hover{
transform:scale(1.07);
background:#ff9800;
color:white;
box-shadow:0 0 15px #ff9800,
           0 0 30px #ff9800,
           0 0 60px #ff9800;
}

/* Shine Effect */

.link-btn::before{
content:'';
position:absolute;
width:100%;
height:100%;
top:0;
left:-100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
transition:0.5s;
}

.link-btn:hover::before{
left:100%;
}

</style>
